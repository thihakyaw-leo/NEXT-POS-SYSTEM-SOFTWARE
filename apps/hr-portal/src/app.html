<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400..900;1,14..32,400..900&family=Noto+Sans+Myanmar:wght@400;500;600;700;800&display=swap" rel="stylesheet">
		<script>
			(function () {
				try {
					var p = localStorage.getItem('theme-preference');
					var dark =
						p === 'dark' ||
						(p !== 'light' &&
							window.matchMedia &&
							window.matchMedia('(prefers-color-scheme: dark)').matches);
					if (dark) document.documentElement.classList.add('dark');
				} catch (e) {}
			})();
		</script>
		<title>NEXT HR | Enterprise Workforce Solutions</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div>%sveltekit.body%</div>
	</body>
</html>
